run:
  assets: [BTC/USDT]
  timeframe: 15m
  start: 2025-04-10
  end:   2025-04-15
  initial_balance: 10000
  dump_bar_artifacts: false

execution:
  fill: next_bar_open
  taker_fee_bps: 4
  slippage_bps: 2
  risk_pct: 0.02

indicators:
  rsi: 14
  macd: [12, 26, 9]
  adx: 14
  ema_fast: 20
  ema_slow: 50
  supertrend: [10, 3]

llm:
  cache_dir: cache/llm
  max_usd: 10.00
  mock: false
  image_window_bars: 60
  agents:
    technical: { model: anthropic/claude-haiku-4.5, temperature: 0 }
    visual:    { model: anthropic/claude-haiku-4.5, temperature: 0, chart_window: 100 }
    qabba:     { model: anthropic/claude-haiku-4.5, temperature: 0, lookback: 50 }
    decision:  { model: anthropic/claude-haiku-4.5, temperature: 0 }
  consensus_weights: { qabba: 0.40, visual: 0.35, technical: 0.25 }
  consensus_threshold: 0.35
  expected_output_tokens: 300
  pricing:
    anthropic/claude-haiku-4.5:
      in_per_1m: 1.00
      out_per_1m: 5.00

data:
  source: binance
  qabba_mode: aggtrades
